name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.10 = oldest we claim to support (pyproject requires-python);
        # friends on Ubuntu 22.04 have it as the system Python.
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import allowlist (engines use stdlib + chess only)
        run: python tools/check_imports.py engines

      - name: Tests
        run: pytest -q

      - name: Smoke tournament (every engine loads and plays)
        run: python -m grokchess.tournament --rounds 1 --time-limit 1 --max-plies 60 -v
