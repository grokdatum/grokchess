name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import allowlist (engines use stdlib + chess only)
        run: python tools/check_imports.py engines

      - name: Tests
        run: pytest -q

      - name: Smoke tournament (every engine loads and plays)
        run: python -m grokchess.tournament --rounds 1 --time-limit 1 --max-plies 60 -v
