<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>grokchess</title>
<style>
  :root {
    --bg: #191b1d;
    --panel: #24272a;
    --panel-2: #2e3236;
    --text: #eef0ed;
    --muted: #aeb6ad;
    --line: #444b50;
    --green: #6f9b57;
    --gold: #d6b35a;
    --light: #e8dcc2;
    --dark: #638b5a;
    --sel: rgba(236, 213, 83, 0.7);
    --target: rgba(18, 78, 33, 0.42);
    --last: rgba(214, 179, 90, 0.5);
    --check: #d86a6a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  button, select, input {
    font: inherit;
  }
  button, select {
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel-2);
    color: var(--text);
    padding: 0.48rem 0.65rem;
  }
  button {
    cursor: pointer;
    background: var(--green);
    border-color: var(--green);
    color: #fff;
    font-weight: 700;
  }
  button.secondary {
    background: var(--panel-2);
    border-color: var(--line);
  }
  button:disabled {
    cursor: wait;
    opacity: 0.65;
  }
  label {
    display: grid;
    gap: 0.25rem;
    color: var(--muted);
    font-size: 0.85rem;
  }
  label span {
    color: var(--text);
    font-size: 0.95rem;
  }
  .app {
    width: min(1180px, 100%);
    margin: 0 auto;
    padding: 1rem;
    display: grid;
    grid-template-columns: minmax(320px, 640px) minmax(280px, 420px);
    gap: 1rem;
    align-items: start;
  }
  header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 0.25rem 0;
  }
  h1 {
    margin: 0;
    font-size: 1.35rem;
    letter-spacing: 0;
  }
  .tabs {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 7px;
    overflow: hidden;
    background: var(--panel);
  }
  .tab {
    border: 0;
    border-radius: 0;
    background: transparent;
    color: var(--muted);
    padding: 0.55rem 0.8rem;
  }
  .tab.active {
    background: var(--green);
    color: #fff;
  }
  .board-wrap {
    width: 100%;
  }
  #board {
    position: relative;
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    grid-template-rows: repeat(8, minmax(0, 1fr));
    width: min(92vw, 640px);
    aspect-ratio: 1 / 1;
    border: 3px solid #111;
    border-radius: 6px;
    overflow: hidden;
    user-select: none;
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
  }
  .sq {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
    min-height: 0;
    aspect-ratio: 1 / 1;
    cursor: pointer;
  }
  .sq.light { background: var(--light); }
  .sq.dark { background: var(--dark); }
  .piece {
    position: relative;
    z-index: 2;
    display: block;
    width: 100%;
    text-align: center;
    font-family: "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
    font-size: clamp(2rem, 8.5vw, 4.6rem);
    line-height: 1;
    transition: transform 150ms ease;
  }
  .sq:hover .piece {
    transform: translateY(-2px);
  }
  .white-piece .piece {
    color: #f8f8f1;
    text-shadow: 0 0 2px #000, 0 2px 3px rgba(0,0,0,0.45);
  }
  .black-piece .piece {
    color: #202225;
    text-shadow: 0 0 1px rgba(255,255,255,0.55);
  }
  .sq.sel::after,
  .sq.last::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .sq.sel::after { background: var(--sel); }
  .sq.last::after { background: var(--last); }
  .sq.target::before {
    content: "";
    position: absolute;
    width: 30%;
    height: 30%;
    border-radius: 50%;
    background: var(--target);
    z-index: 1;
    pointer-events: none;
  }
  .sq.target.occupied::before {
    width: 100%;
    height: 100%;
    border-radius: 0;
    background: none;
    box-shadow: inset 0 0 0 6px var(--target);
  }
  .sq.incheck { background: var(--check) !important; }
  .anim-piece {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI Symbol", "Noto Sans Symbols 2", serif;
    font-size: clamp(2rem, 8.5vw, 4.6rem);
    line-height: 1;
    transition: transform 240ms cubic-bezier(.2,.8,.2,1), opacity 240ms ease;
    text-shadow: 0 2px 4px rgba(0,0,0,0.35);
  }
  .side {
    display: grid;
    gap: 0.8rem;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.9rem;
    display: grid;
    gap: 0.8rem;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .controls .wide {
    grid-column: 1 / -1;
  }
  #status, #turnline {
    color: var(--muted);
    min-height: 1.3rem;
  }
  #status {
    color: var(--text);
    font-size: 1.05rem;
  }
  .hidden { display: none; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92rem;
  }
  th, td {
    padding: 0.42rem 0.35rem;
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  th {
    color: var(--muted);
    font-weight: 600;
  }
  .games {
    max-height: 220px;
    overflow: auto;
    display: grid;
    gap: 0.35rem;
  }
  .game-row {
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel-2);
    color: var(--text);
    padding: 0.45rem 0.55rem;
    text-align: left;
  }
  .game-row.active {
    border-color: var(--gold);
  }
  @media (max-width: 860px) {
    .app {
      grid-template-columns: 1fr;
    }
    header {
      align-items: stretch;
      flex-direction: column;
    }
    #board {
      width: min(94vw, 640px);
      margin: 0 auto;
    }
  }
</style>
</head>
<body>
<main class="app">
  <header>
    <h1>grokchess</h1>
    <div class="tabs" role="tablist">
      <button class="tab active" id="play-tab" data-mode="play">Fight Bot</button>
      <button class="tab" id="tournament-tab" data-mode="tournament">Tournament</button>
    </div>
  </header>

  <section class="board-wrap">
    <div id="board" aria-label="Chess board"></div>
  </section>

  <aside class="side">
    <section class="panel" id="play-panel">
      <div class="controls">
        <label><span>Engine</span><select id="engine"></select></label>
        <label><span>You play</span>
          <select id="color">
            <option value="white">White</option>
            <option value="black">Black</option>
          </select>
        </label>
        <button id="new" class="wide">New Game</button>
      </div>
    </section>

    <section class="panel hidden" id="tournament-panel">
      <div class="controls">
        <label><span>Mode</span>
          <select id="tournament-mode">
            <option value="simulate">Simulation</option>
            <option value="watch">Watch</option>
          </select>
        </label>
        <label><span>Max plies</span>
          <select id="max-plies">
            <option value="40">40</option>
            <option value="80" selected>80</option>
            <option value="160">160</option>
            <option value="400">400</option>
          </select>
        </label>
        <button id="run-tournament" class="wide">Start Tournament</button>
      </div>
      <div class="controls" id="watch-controls">
        <button id="prev-game" class="secondary">Prev</button>
        <button id="next-game" class="secondary">Next</button>
        <button id="play-watch" class="wide secondary">Play Replay</button>
      </div>
    </section>

    <section class="panel">
      <div id="status">Pick an engine and start a game.</div>
      <div id="turnline"></div>
    </section>

    <section class="panel hidden" id="results-panel">
      <div id="standings"></div>
      <div class="games" id="games"></div>
    </section>
  </aside>
</main>

<script>
const FILES = ["a","b","c","d","e","f","g","h"];
const GLYPH = {
  K:"\u2654", Q:"\u2655", R:"\u2656", B:"\u2657", N:"\u2658", P:"\u2659",
  k:"\u265a", q:"\u265b", r:"\u265c", b:"\u265d", n:"\u265e", p:"\u265f"
};

let mode = "play";
let state = null;
let selected = null;
let renderedEvents = 0;
let tournament = null;
let tournamentJobTimer = null;
let watchGameIndex = 0;
let watchFrameIndex = 0;
let watchTimer = null;
let audioCtx = null;

const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");
const turnEl = document.getElementById("turnline");
const resultsPanel = document.getElementById("results-panel");

function parseFen(fen) {
  const rows = fen.split(" ")[0].split("/");
  const pieces = {};
  for (let r = 0; r < 8; r++) {
    let file = 0;
    for (const ch of rows[r]) {
      if (/\d/.test(ch)) file += parseInt(ch, 10);
      else pieces[FILES[file++] + (8 - r)] = ch;
    }
  }
  return pieces;
}

function orderedSquares(orientation) {
  const files = FILES.slice();
  const ranks = [8, 7, 6, 5, 4, 3, 2, 1];
  if (orientation === "black") {
    files.reverse();
    ranks.reverse();
  }
  const out = [];
  for (const r of ranks) for (const f of files) out.push(f + r);
  return out;
}

function targetsFrom(sq) {
  if (!state || mode !== "play") return [];
  return state.legal_moves.filter(m => m.from === sq).map(m => m.to);
}

function myTurn() {
  return mode === "play" && state && state.status === "playing" && state.turn === state.human_color;
}

function findKing(pieces, turn) {
  const target = turn === "white" ? "K" : "k";
  for (const sq in pieces) if (pieces[sq] === target) return sq;
  return null;
}

function renderBoard(view) {
  const pieces = parseFen(view.fen);
  const orientation = view.orientation || "white";
  const squares = orderedSquares(orientation);
  const targets = selected ? targetsFrom(selected) : [];
  const last = view.lastMove ? [view.lastMove.slice(0,2), view.lastMove.slice(2,4)] : [];
  const kingInCheck = view.check ? findKing(pieces, view.turn) : null;

  boardEl.innerHTML = "";
  for (const sq of squares) {
    const file = FILES.indexOf(sq[0]);
    const rank = parseInt(sq[1], 10);
    const dark = (file + rank) % 2 === 1;
    const cell = document.createElement("div");
    cell.className = "sq " + (dark ? "dark" : "light");
    cell.dataset.square = sq;
    const piece = pieces[sq];
    if (piece) {
      const isWhite = piece === piece.toUpperCase();
      cell.classList.add(isWhite ? "white-piece" : "black-piece");
      const span = document.createElement("span");
      span.className = "piece";
      span.textContent = GLYPH[piece];
      cell.appendChild(span);
    }
    if (sq === selected) cell.classList.add("sel");
    if (targets.includes(sq)) {
      cell.classList.add("target");
      if (piece) cell.classList.add("occupied");
    }
    if (last.includes(sq)) cell.classList.add("last");
    if (sq === kingInCheck) cell.classList.add("incheck");
    cell.addEventListener("click", () => onSquare(sq));
    boardEl.appendChild(cell);
  }
}

function playCaptureSound() {
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(180, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(70, audioCtx.currentTime + 0.09);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.13);
}

function animateMove(event) {
  if (!event || !event.piece) return;
  const fromEl = boardEl.querySelector(`[data-square="${event.from}"]`);
  const toEl = boardEl.querySelector(`[data-square="${event.to}"]`);
  if (!fromEl || !toEl) return;
  const from = fromEl.getBoundingClientRect();
  const to = toEl.getBoundingClientRect();
  const ghost = document.createElement("div");
  ghost.className = "anim-piece";
  ghost.textContent = GLYPH[event.piece] || "";
  ghost.style.left = `${from.left}px`;
  ghost.style.top = `${from.top}px`;
  ghost.style.width = `${from.width}px`;
  ghost.style.height = `${from.height}px`;
  document.body.appendChild(ghost);
  requestAnimationFrame(() => {
    ghost.style.transform = `translate(${to.left - from.left}px, ${to.top - from.top}px)`;
    ghost.style.opacity = "0.15";
  });
  if (event.captured) playCaptureSound();
  setTimeout(() => ghost.remove(), 270);
}

function renderPlay() {
  if (!state) {
    renderBoard({ fen: "8/8/8/8/8/8/8/8 w - - 0 1", orientation: "white" });
    return;
  }
  renderBoard({
    fen: state.fen,
    orientation: state.human_color,
    lastMove: state.last_move,
    turn: state.turn,
    check: state.check,
  });
  renderStatus();
}

function renderStatus() {
  if (!state) return;
  const engine = state.engine;
  if (state.status === "playing") {
    statusEl.textContent = state.turn === state.human_color ? "Your move" : `${engine} is thinking...`;
    turnEl.textContent = `You: ${state.human_color} | Engine: ${engine} | move ${state.move_number}`;
  } else {
    const outcome = { white_wins: "White wins", black_wins: "Black wins", draw: "Draw" }[state.status] || state.status;
    const youWon =
      (state.status === "white_wins" && state.human_color === "white") ||
      (state.status === "black_wins" && state.human_color === "black");
    const tag = state.status === "draw" ? "" : (youWon ? " | you win" : " | engine wins");
    let reason = state.reason ? ` (${state.reason.replace(/_/g, " ")})` : "";
    if (state.detail) reason += ` | ${state.detail}`;
    statusEl.textContent = `${outcome}${tag}${reason}`;
    turnEl.textContent = "";
  }
}

function onSquare(sq) {
  if (!myTurn()) return;
  const pieces = parseFen(state.fen);
  const piece = pieces[sq];
  const isMine = piece && ((state.human_color === "white") === (piece === piece.toUpperCase()));
  if (selected === null) {
    if (isMine && targetsFrom(sq).length) {
      selected = sq;
      renderPlay();
    }
    return;
  }
  if (targetsFrom(selected).includes(sq)) {
    sendMove(selected, sq);
    selected = null;
    return;
  }
  selected = (isMine && targetsFrom(sq).length) ? sq : null;
  renderPlay();
}

async function api(path, body) {
  const res = await fetch(path, {
    method: body ? "POST" : "GET",
    headers: body ? { "Content-Type": "application/json" } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

function applyPlayState(nextState) {
  const priorEvents = renderedEvents;
  state = nextState;
  renderedEvents = state.move_events.length;
  renderPlay();
  for (const event of state.move_events.slice(priorEvents)) {
    animateMove(event);
  }
}

async function sendMove(from, to) {
  try {
    const promo = state.legal_moves.some(m => m.from === from && m.to === to && m.promotion) ? "q" : null;
    applyPlayState(await api("/api/move", { game_id: state.game_id, from, to, promotion: promo }));
  } catch (e) {
    statusEl.textContent = "Error: " + e.message;
  }
}

async function newGame() {
  try {
    selected = null;
    renderedEvents = 0;
    const engine = document.getElementById("engine").value;
    const human_color = document.getElementById("color").value;
    applyPlayState(await api("/api/new", { engine, human_color }));
  } catch (e) {
    statusEl.textContent = "Error: " + e.message;
  }
}

async function loadEngines() {
  const list = await api("/api/engines");
  const sel = document.getElementById("engine");
  sel.innerHTML = "";
  for (const e of list) {
    const opt = document.createElement("option");
    opt.value = e.name;
    opt.textContent = `${e.name} (${e.league}) - ${e.author}`;
    sel.appendChild(opt);
  }
  if (!list.length) statusEl.textContent = "No engines found.";
}

function renderStandings(data) {
  resultsPanel.classList.remove("hidden");
  document.getElementById("standings").innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Engine</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr></thead>
      <tbody>${data.standings.map(s => `
        <tr><td>${s.rank}</td><td>${s.name}</td><td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td><td>${s.points}</td></tr>
      `).join("")}</tbody>
    </table>`;
  document.getElementById("games").innerHTML = data.games.map((g, i) => `
    <button class="game-row ${i === watchGameIndex ? "active" : ""}" data-game="${i}">
      ${i + 1}. ${g.white} vs ${g.black} - ${g.result} (${g.reason})
    </button>`).join("");
  for (const btn of document.querySelectorAll(".game-row")) {
    btn.addEventListener("click", () => showWatchGame(parseInt(btn.dataset.game, 10)));
  }
}

function showWatchGame(index) {
  if (!tournament || !tournament.games.length) return;
  watchGameIndex = Math.max(0, Math.min(index, tournament.games.length - 1));
  watchFrameIndex = 0;
  renderWatchFrame();
  renderStandings(tournament);
}

function renderWatchFrame() {
  const game = tournament.games[watchGameIndex];
  const frame = game.frames[watchFrameIndex];
  const event = frame.event;
  renderBoard({
    fen: frame.fen,
    orientation: "white",
    lastMove: event ? event.uci : null,
    turn: frame.fen.split(" ")[1] === "w" ? "white" : "black",
    check: false,
  });
  statusEl.textContent = `${game.white} vs ${game.black} - ${game.result} (${game.reason})`;
  turnEl.textContent = `Game ${watchGameIndex + 1}/${tournament.games.length} | move ${watchFrameIndex}/${game.moves.length}`;
  if (event) animateMove(event);
}

function stepWatch() {
  const game = tournament.games[watchGameIndex];
  if (watchFrameIndex < game.frames.length - 1) {
    watchFrameIndex++;
    renderWatchFrame();
    return true;
  }
  if (watchGameIndex < tournament.games.length - 1) {
    watchGameIndex++;
    watchFrameIndex = 0;
    renderWatchFrame();
    renderStandings(tournament);
    return true;
  }
  return false;
}

async function runTournament() {
  const btn = document.getElementById("run-tournament");
  btn.disabled = true;
  btn.textContent = "Running...";
  stopWatch();
  stopTournamentPolling();
  try {
    const max_plies = parseInt(document.getElementById("max-plies").value, 10);
    tournament = await api("/api/tournament/start", { rounds: 1, max_plies });
    watchGameIndex = 0;
    watchFrameIndex = 0;
    renderStandings(tournament);
    renderTournamentProgress(tournament);
    tournamentJobTimer = setInterval(() => pollTournament(tournament.id), 600);
  } catch (e) {
    statusEl.textContent = "Error: " + e.message;
    btn.disabled = false;
    btn.textContent = "Start Tournament";
  }
}

async function pollTournament(jobId) {
  try {
    tournament = await api(`/api/tournament/status/${jobId}`);
    renderStandings(tournament);
    renderTournamentProgress(tournament);
    if (tournament.status === "done") {
      finishTournament();
    } else if (tournament.status === "error") {
      stopTournamentPolling();
      document.getElementById("run-tournament").disabled = false;
      document.getElementById("run-tournament").textContent = "Start Tournament";
      statusEl.textContent = `Tournament failed: ${tournament.error}`;
    }
  } catch (e) {
    stopTournamentPolling();
    document.getElementById("run-tournament").disabled = false;
    document.getElementById("run-tournament").textContent = "Start Tournament";
    statusEl.textContent = "Error: " + e.message;
  }
}

function renderTournamentProgress(data) {
  const total = data.total_games || data.games.length;
  const done = data.completed_games ?? data.games.length;
  statusEl.textContent = data.status === "done" ? "Tournament complete" : "Tournament running...";
  turnEl.textContent = `${done}/${total} games complete`;
}

function finishTournament() {
  stopTournamentPolling();
  const btn = document.getElementById("run-tournament");
  btn.disabled = false;
  btn.textContent = "Start Tournament";
  if (document.getElementById("tournament-mode").value === "watch" && tournament.games.length) {
    watchGameIndex = 0;
    watchFrameIndex = 0;
    renderWatchFrame();
    startWatch();
  } else {
    const winner = tournament.standings[0];
    statusEl.textContent = `${winner.name} wins the tournament`;
    turnEl.textContent = `${tournament.games.length} games completed`;
  }
}

function stopTournamentPolling() {
  if (tournamentJobTimer) clearInterval(tournamentJobTimer);
  tournamentJobTimer = null;
}

function startWatch() {
  if (!tournament || !tournament.games.length) return;
  stopWatch();
  document.getElementById("play-watch").textContent = "Pause Replay";
  watchTimer = setInterval(() => {
    if (!stepWatch()) stopWatch();
  }, 650);
}

function stopWatch() {
  if (watchTimer) clearInterval(watchTimer);
  watchTimer = null;
  document.getElementById("play-watch").textContent = "Play Replay";
}

function setMode(nextMode) {
  mode = nextMode;
  selected = null;
  stopWatch();
  for (const tab of document.querySelectorAll(".tab")) {
    tab.classList.toggle("active", tab.dataset.mode === mode);
  }
  document.getElementById("play-panel").classList.toggle("hidden", mode !== "play");
  document.getElementById("tournament-panel").classList.toggle("hidden", mode !== "tournament");
  if (mode === "play") renderPlay();
  else if (tournament) renderWatchFrame();
}

document.getElementById("new").addEventListener("click", newGame);
document.getElementById("run-tournament").addEventListener("click", runTournament);
document.getElementById("prev-game").addEventListener("click", () => showWatchGame(watchGameIndex - 1));
document.getElementById("next-game").addEventListener("click", () => showWatchGame(watchGameIndex + 1));
document.getElementById("play-watch").addEventListener("click", () => watchTimer ? stopWatch() : startWatch());
for (const tab of document.querySelectorAll(".tab")) {
  tab.addEventListener("click", () => setMode(tab.dataset.mode));
}
document.addEventListener("pointerdown", () => {
  if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}, { once: true });

renderBoard({ fen: "8/8/8/8/8/8/8/8 w - - 0 1", orientation: "white" });
loadEngines();
</script>
